<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>用户注册</h1>

    <div th:if="${errorMsg}" class="alert error" th:text="${errorMsg}"></div>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
        <div class="form-group">
            <label for="username">用户名：</label>
            <input type="text" id="username" th:field="*{username}" required autofocus>
        </div>
        <div class="form-group">
            <label for="realName">真实姓名：</label>
            <input type="text" id="realName" th:field="*{realName}">
        </div>
        <div class="form-group">
            <label for="password">密码：</label>
            <input type="password" id="password" th:field="*{password}" required>
        </div>
        <div class="form-group">
            <label for="confirmPassword">确认密码：</label>
            <input type="password" id="confirmPassword" th:field="*{confirmPassword}" required>
        </div>
        <div class="form-group">
            <label for="role">角色：</label>
            <select id="role" th:field="*{role}">
                <option value="STUDENT">学生</option>
                <option value="TEACHER">教师</option>
            </select>
        </div>
        <button type="submit">注册</button>
    </form>
    <p>已有账号？ <a th:href="@{/login}">去登录</a></p>
</div>
</body>
</html>
